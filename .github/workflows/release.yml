name: Release

# Tag-driven releases, mirroring the KwaaiNet repo's flow: push a vX.Y.Z tag
# (scripts/release.sh does this for you) and this builds all three desktop
# platforms and publishes a GitHub Release with the archives attached.
#
# The build/bundle/package steps below are kept in sync with the `build` job
# in ci.yml — if you change one, change the other.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            kwaainet_asset: kwaainet-x86_64-unknown-linux-gnu.tar.xz
            bundle_dir: build/linux/x64/release/bundle
            artifact_path: build/linux/x64/release/bundle
          - os: macos-latest
            target: macos
            kwaainet_asset: kwaainet-aarch64-apple-darwin.tar.xz
            bundle_dir: build/macos/Build/Products/Release/kwaainet_gui.app/Contents/MacOS
            artifact_path: build/macos/Build/Products/Release/kwaainet_gui.app
          - os: windows-latest
            target: windows
            kwaainet_asset: kwaainet-x86_64-pc-windows-msvc.zip
            bundle_dir: build/windows/x64/runner/Release
            artifact_path: build/windows/x64/runner/Release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config \
            libayatana-appindicator3-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build ${{ matrix.target }}
        run: flutter build ${{ matrix.target }} --release

      - name: Resolve kwaainet version
        id: kwaainet
        shell: bash
        run: |
          ver="$(tr -d '[:space:]' < .kwaainet-version)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Bundling kwaainet $ver"

      - name: Download & bundle kwaainet + p2pd (Unix)
        if: matrix.target != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          ver='${{ steps.kwaainet.outputs.version }}'
          asset='${{ matrix.kwaainet_asset }}'
          dest="$GITHUB_WORKSPACE/${{ matrix.bundle_dir }}"
          gh release download "$ver" --repo Kwaai-AI-Lab/KwaaiNet \
            --pattern "$asset" --pattern "$asset.sha256" --dir /tmp/kw --clobber
          cd /tmp/kw
          shasum -a 256 -c "$asset.sha256"
          tar -xf "$asset"
          src="${asset%.tar.xz}"
          install -m 0755 "$src/kwaainet" "$dest/kwaainet"
          install -m 0755 "$src/p2pd" "$dest/p2pd"

      - name: Download & bundle kwaainet + p2pd (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '${{ steps.kwaainet.outputs.version }}'
          $asset = '${{ matrix.kwaainet_asset }}'
          $dest = "$env:GITHUB_WORKSPACE\${{ matrix.bundle_dir }}"
          gh release download $ver --repo Kwaai-AI-Lab/KwaaiNet `
            --pattern $asset --pattern "$asset.sha256" --dir $env:TEMP\kw --clobber
          Push-Location $env:TEMP\kw
          $expected = (Get-Content "$asset.sha256").Split(' ')[0].Trim()
          $actual = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) { throw "sha256 mismatch for $asset" }
          Expand-Archive -Path $asset -DestinationPath kw -Force
          Pop-Location
          Copy-Item "$env:TEMP\kw\kw\kwaainet.exe" "$dest\kwaainet.exe" -Force
          Copy-Item "$env:TEMP\kw\kw\p2pd.exe"     "$dest\p2pd.exe"     -Force

      - name: Package (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --keepParent \
            "${{ matrix.artifact_path }}" "$GITHUB_WORKSPACE/kwaainet-gui-macos.zip"

      - name: Package (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          tar -C "$(dirname "${{ matrix.artifact_path }}")" \
            -czf "$GITHUB_WORKSPACE/kwaainet-gui-linux.tar.gz" \
            "$(basename "${{ matrix.artifact_path }}")"

      - name: Package (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path "${{ matrix.artifact_path }}\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\kwaainet-gui-windows.zip" -Force

      - name: Stage archive for release
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: kwaainet-gui-${{ matrix.target }}.${{ matrix.target == 'linux' && 'tar.gz' || 'zip' }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: KwaaiNet GUI ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
